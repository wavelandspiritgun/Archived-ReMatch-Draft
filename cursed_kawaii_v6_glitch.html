<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Kawaii v6 // Data Mosh</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0a0a0a;
            --pink: #ff00a0;
            --cyan: #00f0ff;
            --yellow: #fff000;
        }

        body {
            margin: 0;
            background-color: var(--dark);
            color: #fff;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* ---------------------------------------------------
           DATA MOSH EFFECT (CSS Slices)
           --------------------------------------------------- */
        .glitch-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glitch-text {
            font-family: 'Rubik Glitch', cursive;
            font-size: 15vw;
            position: absolute;
            color: #fff;
            text-transform: uppercase;
        }

        /* Creates multiple overlapping slices of the same text */
        .g1 { color: var(--cyan); clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%); transform: translate(-5px, -5px); animation: jiggle 0.2s infinite; }
        .g2 { color: var(--pink); clip-path: polygon(0 30%, 100% 30%, 100% 60%, 0 60%); transform: translate(5px, 0px); animation: jiggle 0.3s infinite reverse; }
        .g3 { color: var(--yellow); clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%); transform: translate(-2px, 5px); animation: jiggle 0.15s infinite; }

        @keyframes jiggle {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, 3px); }
            80% { transform: translate(2px, -3px); }
            100% { transform: translate(0, 0); }
        }

        /* ---------------------------------------------------
           CHARACTER / ANIME POP-INS
           --------------------------------------------------- */
        .character-pop {
            position: absolute;
            width: 300px;
            height: 400px;
            background-color: var(--cyan);
            border: 4px solid #fff;
            box-shadow: 10px 10px 0 var(--pink);
            /* Masking to look like a torn comic panel */
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
            opacity: 0;
            transform: scale(0.5) rotate(20deg);
            animation: popIn 4s infinite;
            background-size: cover;
            background-position: center;
        }

        .c-left { 
            left: 5vw; top: 10vh; animation-delay: 0s; box-shadow: -10px 10px 0 var(--cyan); 
            background-image: url('https://image.pollinations.ai/prompt/masterpiece,%20hiroyuki%20takahashi%20style,%20mutant%20android%20character,%20vivid%20electric%20blue%20and%20cyber%20yellow,%20hyper%20detailed,%20anime%20horror,%20body%20horror,%20ink%20bleed?width=300&height=400&nologo=true');
        }
        .c-right { 
            right: 5vw; bottom: 10vh; animation-delay: 2s; 
            background-image: url('https://image.pollinations.ai/prompt/masterpiece,%20hiroyuki%20takahashi%20style,%20cybernetic%20streetwear%20character,%20vivid%20neon%20pink%20and%20toxic%20green,%20hyper%20detailed,%20anime%20horror,%20body%20horror,%20glitch%20art?width=300&height=400&nologo=true');
        }

        @keyframes popIn {
            0%, 80% { opacity: 0; transform: scale(0.5) rotate(20deg); }
            85% { opacity: 1; transform: scale(1.1) rotate(-5deg); }
            90% { opacity: 1; transform: scale(1) rotate(0deg); }
            95% { opacity: 0.8; transform: scale(1.05) rotate(2deg); filter: invert(1); }
            100% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
        }

    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="glitch-container">
        <!-- Text layers for mosh effect -->
        <div class="glitch-text">RE.MATCH</div>
        <div class="glitch-text g1">RE.MATCH</div>
        <div class="glitch-text g2">RE.MATCH</div>
        <div class="glitch-text g3">RE.MATCH</div>
    </div>

    <!-- Character Asset Placeholders -->
    <div class="character-pop c-left"></div>
    <div class="character-pop c-right"></div>

</body>
</html>
